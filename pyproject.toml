# Dev tooling config. None of this is needed to build or run the Flatpak —
# it only powers your editor's linting, formatting, and type checking.

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
# A sane starter set: pyflakes (F), pycodestyle (E/W), isort (I), and a few
# bug-catchers. Add more rules as you get comfortable.
select = ["E", "W", "F", "I", "UP", "B", "SLF"]

[tool.ruff.lint.per-file-ignores]
# gi.require_version() must run before the gi.repository import it configures,
# which pushes that import (and everything after it) below E402's threshold.
"src/postcard/application.py" = ["E402"]
"src/postcard/core/secrets.py" = ["E402"]
"src/postcard/message_view.py" = ["E402"]
"src/postcard/window.py" = ["E402"]

[tool.pyright]
# "basic" catches real mistakes without fighting GTK's incomplete type stubs.
# Bump to "strict" later if you want more rigour.
typeCheckingMode = "basic"
pythonVersion = "3.12"
include = ["src/postcard"]
venvPath = "."
venv = ".venv"
# gi.repository submodules (Gtk, Adw, ...) are generated at runtime from
# GObject Introspection, so there's never real source to check stubs
# against — this warning is expected noise on every gi import.
reportMissingModuleSource = "none"
