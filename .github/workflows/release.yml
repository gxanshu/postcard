name: Release Flatpak

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual "publish now" button in the Actions tab

permissions:
  contents: write        # push the `pages` branch and the version tag

concurrency:
  group: release
  cancel-in-progress: false

env:
  APP_ID: in.gxanshu.postcard
  DOMAIN: postcard.gxanshu.in

jobs:
 check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is_new: ${{ steps.detect.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags to check for v<version>

      - id: detect
        run: |
          VERSION=$(grep -m1 'version:' meson.build | sed -E "s/.*'([^']+)'.*/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION is already released — nothing to do."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New version v$VERSION detected — releasing."
          fi

 release:
    needs: check
    if: needs.check.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    env:
      VERSION: ${{ needs.check.outputs.version }}
      GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore published site
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: pages
          path: _site

      - name: Ensure site layout
        run: |
          mkdir -p _site/repo
          rm -rf _site/.git   # we re-init a clean orphan history when publishing

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Build Flatpak into the repo
        run: |
          flatpak-builder --force-clean --user \
            --repo=_site/repo --gpg-sign="$GPG_KEY_ID" \
            _build "$APP_ID.json"

      - name: Update repo metadata + static deltas
        run: |
          flatpak build-update-repo \
            --generate-static-deltas --prune --prune-depth=20 \
            --gpg-sign="$GPG_KEY_ID" _site/repo

      - name: Assemble .flatpakrepo + repo metadata
        run: |
          cp "data/icons/hicolor/256x256/apps/$APP_ID.png" _site/icon.png
          gpg --export "$GPG_KEY_ID" > _site/postcard.gpg
          GPGKEY=$(base64 -w0 _site/postcard.gpg)
          cat > _site/postcard.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=Postcard
          Url=https://$DOMAIN/repo/
          Homepage=https://github.com/gxanshu/postcard
          Comment=A modern email client for GNOME
          Description=Official Flatpak repository for Postcard
          Icon=https://$DOMAIN/icon.png
          GPGKey=$GPGKEY
          EOF
          echo "$DOMAIN" > _site/CNAME
          touch _site/.nojekyll

      - name: Publish to the pages branch
        run: |
          cd _site
          git init -q -b pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish Postcard $VERSION"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            pages

      - name: Tag the release
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git tag "v$VERSION"
          git push \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            "v$VERSION"
